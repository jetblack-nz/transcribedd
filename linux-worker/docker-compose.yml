services:
  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    security_opt:
      - apparmor=unconfined
    volumes:
      - whisper-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  whisper-cache:
